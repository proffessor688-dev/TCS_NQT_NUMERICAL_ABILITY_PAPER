<!doctype html>
<html>
  <head>
    <title>TCS NQT Mock Test</title>
    <style>
      * { box-sizing: border-box; }
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f0f4ff;
      }
      header {
        background: #1a73e8;
        color: white;
        padding: 14px 20px;
        text-align: center;
        position: sticky;
        top: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      header h2 { margin: 0; font-size: 20px; }
      .timer {
        font-size: 18px;
        color: #ffe082;
        font-weight: bold;
        background: rgba(0,0,0,0.2);
        padding: 4px 14px;
        border-radius: 20px;
      }
      .container {
        padding: 24px 20px;
        max-width: 820px;
        margin: auto;
      }

      /* ── Start Screen ── */
      .start-screen {
        background: white;
        border-radius: 14px;
        padding: 50px 36px;
        text-align: center;
        box-shadow: 0 4px 20px rgba(26,115,232,0.12);
        margin-top: 40px;
      }
      .start-screen h1 { color: #1a73e8; margin-bottom: 6px; }
      .start-screen p  { color: #555; font-size: 15px; margin: 8px 0; }
      .info-boxes {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin: 30px 0;
        flex-wrap: wrap;
      }
      .info-box {
        background: #f0f4ff;
        border-radius: 10px;
        padding: 18px 28px;
        min-width: 130px;
      }
      .info-box strong { display: block; font-size: 26px; color: #1a73e8; }
      .info-box span   { font-size: 13px; color: #666; }
      .start-btn {
        background: #1a73e8;
        color: white;
        border: none;
        padding: 14px 50px;
        font-size: 17px;
        border-radius: 8px;
        cursor: pointer;
        margin-top: 10px;
        transition: background 0.2s;
      }
      .start-btn:hover { background: #1558b0; }

      /* ── Questions ── */
      .section-title {
        color: #1a73e8;
        font-size: 22px;
        margin-bottom: 16px;
      }
      .question {
        background: white;
        padding: 18px 20px;
        margin-bottom: 14px;
        border-radius: 10px;
        box-shadow: 0 1px 5px rgba(0,0,0,0.07);
      }
      .question p {
        margin: 0 0 12px 0;
        font-weight: bold;
        line-height: 1.6;
        color: #222;
      }
      label {
        display: block;
        margin: 7px 0;
        cursor: pointer;
        color: #333;
        padding: 4px 6px;
        border-radius: 4px;
      }
      label:hover { background: #f0f4ff; color: #1a73e8; }
      .submit-btn {
        display: block;
        width: 100%;
        padding: 14px;
        margin-top: 10px;
        margin-bottom: 30px;
        background: #1a73e8;
        color: white;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.2s;
      }
      .submit-btn:hover { background: #1558b0; }

      /* ── Score Card ── */
      .score-card {
        background: white;
        border-radius: 14px;
        padding: 40px 30px;
        text-align: center;
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        margin-top: 20px;
        margin-bottom: 40px;
      }
      .score-card h2 { font-size: 26px; color: #222; margin-bottom: 4px; }
      .score-circle {
        width: 150px;
        height: 150px;
        border-radius: 50%;
        background: linear-gradient(135deg, #1a73e8, #0d47a1);
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin: 20px auto;
        font-size: 38px;
        font-weight: bold;
        box-shadow: 0 6px 20px rgba(26,115,232,0.4);
      }
      .score-circle span { font-size: 14px; font-weight: normal; opacity: 0.88; }
      .score-details {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin: 20px 0 30px;
        flex-wrap: wrap;
      }
      .score-details div {
        background: #f5f8ff;
        border-radius: 10px;
        padding: 16px 28px;
        min-width: 110px;
      }
      .score-details div p    { margin: 0 0 4px; font-size: 13px; color: #777; }
      .score-details div strong { font-size: 24px; }
      .correct { color: #2e7d32; font-weight: bold; }
      .wrong   { color: #c62828; font-weight: bold; }
      .unattempted { color: #e65100; font-weight: bold; }
      .review-section { text-align: left; margin-top: 10px; }
      .review-section h3 {
        color: #1a73e8;
        border-bottom: 2px solid #1a73e8;
        padding-bottom: 8px;
        font-size: 18px;
      }
      .review-item {
        background: #fafafa;
        border-radius: 8px;
        padding: 14px 18px;
        margin-bottom: 10px;
        font-size: 14px;
        border-left: 4px solid #ddd;
        line-height: 1.6;
      }
      .review-item.correct-item  { border-left-color: #2e7d32; }
      .review-item.wrong-item    { border-left-color: #c62828; }
      .review-item.skip-item     { border-left-color: #e65100; }
      .review-item p { margin: 4px 0; }
      .q-text { font-weight: bold; color: #222; margin-bottom: 6px !important; }
    </style>
  </head>
  <body>

    <header>
      <h2>TCS NQT Mock Test</h2>
      <div class="timer" id="timer" style="visibility:hidden;">25:00</div>
    </header>

    <div class="container" id="app"></div>

    <script>

      const questions = [
        {
          q: "Q1. A wall is 10m 73cm in length and 6m 67cm in height. Find the least number of square tiles of equal size required to tile the entire wall completely.",
          options: ["851", "861", "855", "865"],
          answer: "851"
        },
        {
          q: "Q2. What is the maximum number of times that 8/9 can be subtracted from 8, so that the remainder is not less than 3?",
          options: ["7", "5", "4", "6"],
          answer: "5"
        },
        {
          q: "Q3. Out of three numbers, the second is five times the first, and it is also twice the third. If the third number is raised by 8, then the average of the three works out to be 31. What is the smallest number?",
          options: ["15", "16", "10", "12"],
          answer: "10"
        },
        {
          q: "Q4. Aslam drives to his office. If he increases his average speed by 12%, then by what percentage (correct to two decimal places) will his time of travel decrease?",
          options: ["10.34", "11.02", "10.71", "12.00"],
          answer: "10.71"
        },
        {
          q: "Q5. A dealer purchases 15 kg rice at ₹22/kg, 12 kg at ₹25/kg, 18 kg at ₹35/kg and 8 kg at ₹45/kg. He mixed all four types and sold 28 kg at ₹28/kg. At what rate must he sell the remaining rice to earn a profit of 15%?",
          options: ["₹35.15 per kg", "₹38.65 per kg", "₹43.16 per kg", "₹40.35 per kg"],
          answer: "₹43.16 per kg"
        },
        {
          q: "Q6. The average age of Raghu and Bagha is 60 years, which is 15 years more than the average age of Bagha and Tanmay. The average age of Raghu and Tanmay is 65 years. Daya is 12.5% older than Bagha. What is the age of Daya?",
          options: ["45", "35", "30", "40"],
          answer: "45"
        },
        {
          q: "Q7. A university gives 30% relaxation in fees for marks > 90%, 20% for 81–90%, and 10% for 70–80%. In a class of 80 students: 5% scored 95%, 10% scored 90%, 20% scored 80%, and the rest scored < 65%. Total fees is ₹1 lakh per annum. What is the overall percentage relaxation in fees?",
          options: ["14.6%", "15.7%", "13.5%", "16.8%"],
          answer: "15.7%"
        },
        {
          q: "Q8. A sum of money invested for 4 years at 5% simple interest amounted to ₹150 on maturity. What was the sum invested?",
          options: ["₹120", "₹180", "₹176", "₹125"],
          answer: "₹125"
        },
        {
          q: "Q9. Sangeetha can complete a work in 16 days working 10 hours/day. Sahithya can complete the same work in 18 days working 8 hours/day. If both work together at 9 hours/day, in how many days can they complete the work?",
          options: ["180/19 days", "150/19 days", "160/19 days", "170/19 days"],
          answer: "160/19 days"
        },
        {
          q: "Q10. In a class, the ratio of boys to girls is 9:16. If the number of girls is 64% of the class, then what is the number of boys in the class?",
          options: ["10", "9", "16", "11"],
          answer: "9"
        },
        {
          q: "Q11. If (1/x) + (1/x) = 4/17 and (1/y) + (1/y) = 3/10, then find the value of x + (1/xy) + (1/y)?",
          options: ["4", "3", "5", "10"],
          answer: "4"
        },
        {
          q: "Q12. A person invested money at 12.5% per annum compounded annually. If the compound interest for the 3rd year is ₹10,850, for what amount was the money invested?",
          options: ["₹26,600", "₹25,500", "₹25,000", "₹25,600"],
          answer: "₹25,600"
        },
        {
          q: "Q13. A borrowed ₹12,000 from a company at 12% per annum for 15 years. After a certain period, the company reduced the interest rate by 10%. At the end of 15 years, A paid ₹18,000 in total. After how many years did the company introduce the scheme?",
          options: ["3 years", "5 years", "7 years", "10 years"],
          answer: "5 years"
        },
        {
          q: "Q14. One year ago the ratio of income between A and B was 3:5. The ratios of income for the previous year and the current year are 2:3 and 5:7 respectively. The sum of their current incomes is ₹12,900. Find the current income of each.",
          options: ["₹7,200 ; ₹5,700", "₹3,600 ; ₹9,300", "₹8,100 ; ₹4,800", "₹5,400 ; ₹7,500"],
          answer: "₹5,400 ; ₹7,500"
        },
        {
          q: "Q15. A person completes a journey in 12 hours. He travels the first half at 19 km/h and the second half at 21 km/h. What is the total journey distance in km?",
          options: ["217.8", "208.4", "239.4", "226.2"],
          answer: "239.4"
        },
        {
          q: "Q16. A closed box measures externally 90 cm long, 60 cm wide and 45 cm high and is made of wood 2.5 cm thick. What is the cost of lining it on the inside with metal at ₹3 per dm²?",
          options: ["₹572.50", "₹642.50", "₹594.50", "₹616.50"],
          answer: "₹616.50"
        },
        {
          q: "Q17. Mohan and Sohan start from P and Q respectively. Mohan covers the distance from P to Q in 4 hours and Sohan covers the distance from Q to P in 6 hours. Determine the ratio of speeds of Mohan and Sohan.",
          options: ["3:2", "3:5", "2:3", "5:3"],
          answer: "3:2"
        },
        {
          q: "Q18. If the mean deviation is 48.12, find the standard deviation using the empirical relation between mean deviation and standard deviation.",
          options: ["61.15", "58.15", "60.15", "59.15"],
          answer: "59.15"
        },
        {
          q: "Q19. Refer to the table: College P has 510 teachers with a male:female ratio of 8:7, and a teacher-to-student ratio of 3:10. College Q has 255 teachers with a male:female ratio of 2:7, and a teacher-to-student ratio of 2:5. If the total number of students at college P and Q are the same, then teachers at college P are what percentage less than the students of college Q?",
          options: ["70%", "60%", "80%", "75%"],
          answer: "70%"
        }
      ];

      let timeLeft = 1500;
      let timerInterval;

      /* ── Start Screen ── */
      function showStart() {
        document.getElementById("timer").style.visibility = "hidden";
        document.getElementById("app").innerHTML = `
          <div class="start-screen">
            <h1>📝 TCS NQT Mock Test</h1>
            <p>Numerical Ability Section</p>
            <div class="info-boxes">
              <div class="info-box"><strong>19</strong><span>Questions</span></div>
              <div class="info-box"><strong>25</strong><span>Minutes</span></div>
              <div class="info-box"><strong>1</strong><span>Section</span></div>
            </div>
            <p style="color:#888; font-size:13px;">⚠️ The test will auto-submit when the timer runs out.</p>
            <button class="start-btn" onclick="startTest()">▶ Start Test</button>
          </div>`;
      }

      /* ── Load Questions ── */
      function startTest() {
        document.getElementById("timer").style.visibility = "visible";
        loadQuestions();
        startTimer();
      }

      function loadQuestions() {
        const app = document.getElementById("app");
        app.innerHTML = `<h2 class="section-title">Numerical Ability</h2>`;

        questions.forEach((q, i) => {
          let html = `<div class="question"><p>${q.q}</p>`;
          q.options.forEach(opt => {
            html += `<label><input type="radio" name="q${i}" value="${opt}"> ${opt}</label>`;
          });
          html += `</div>`;
          app.innerHTML += html;
        });

        app.innerHTML += `<button class="submit-btn" onclick="submitTest()">Submit &amp; See Score ➜</button>`;
      }

      /* ── Timer ── */
      function startTimer() {
        clearInterval(timerInterval);
        const timerEl = document.getElementById("timer");
        timerInterval = setInterval(() => {
          let min = Math.floor(timeLeft / 60);
          let sec = timeLeft % 60;
          timerEl.innerText = `${min}:${sec < 10 ? "0" + sec : sec}`;
          if (timeLeft <= 60) timerEl.style.color = "#ff5252";
          timeLeft--;
          if (timeLeft < 0) {
            clearInterval(timerInterval);
            submitTest();
          }
        }, 1000);
      }

      /* ── Submit & Score ── */
      function submitTest() {
        clearInterval(timerInterval);
        document.getElementById("timer").innerText = "Time Up!";

        let score = 0, wrong = 0, unanswered = 0;
        let reviewHTML = "";

        questions.forEach((q, i) => {
          const sel = document.querySelector(`input[name="q${i}"]:checked`);
          const userAns = sel ? sel.value : null;
          const correct = q.answer;

          if (!userAns) {
            unanswered++;
            reviewHTML += `
              <div class="review-item skip-item">
                <p class="q-text">${q.q}</p>
                <p>Your answer: <span class="unattempted">— Not attempted</span></p>
                <p>Correct answer: <span class="correct">✔ ${correct}</span></p>
              </div>`;
          } else if (userAns === correct) {
            score++;
            reviewHTML += `
              <div class="review-item correct-item">
                <p class="q-text">${q.q}</p>
                <p>Your answer: <span class="correct">✔ ${userAns}</span></p>
              </div>`;
          } else {
            wrong++;
            reviewHTML += `
              <div class="review-item wrong-item">
                <p class="q-text">${q.q}</p>
                <p>Your answer: <span class="wrong">✘ ${userAns}</span></p>
                <p>Correct answer: <span class="correct">✔ ${correct}</span></p>
              </div>`;
          }
        });

        const total   = questions.length;
        const percent = Math.round((score / total) * 100);
        const grade   = percent >= 80 ? "🏆 Excellent!" : percent >= 60 ? "👍 Good" : percent >= 40 ? "📚 Keep Practicing" : "💪 Need More Practice";

        document.getElementById("app").innerHTML = `
          <div class="score-card">
            <h2>✅ Test Submitted</h2>
            <p style="color:#888; margin:2px 0 0;">Numerical Ability &nbsp;|&nbsp; ${grade}</p>
            <div class="score-circle">
              ${score}/${total}
              <span>${percent}%</span>
            </div>
            <div class="score-details">
              <div><p>Correct</p>  <strong style="color:#2e7d32;">${score}</strong></div>
              <div><p>Wrong</p>    <strong style="color:#c62828;">${wrong}</strong></div>
              <div><p>Skipped</p>  <strong style="color:#e65100;">${unanswered}</strong></div>
            </div>
            <div class="review-section">
              <h3>📋 Answer Review</h3>
              ${reviewHTML}
            </div>
          </div>`;
      }

      // Init
      showStart();

    </script>
  </body>
</html>
